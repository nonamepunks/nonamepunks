<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner3 视频测试 - The Noname</title>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: Arial, sans-serif; 
            padding: 20px;
            margin: 0;
        }
        .test-container { 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        h1 { color: #DC2626; text-align: center; }
        .status-box {
            background: #1a1a1a;
            border: 2px solid #DC2626;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .status-item {
            padding: 10px;
            margin: 5px 0;
            background: #000;
            border-left: 4px solid #444;
        }
        .status-item.success { border-left-color: #22c55e; background: #052e16; }
        .status-item.error { border-left-color: #ef4444; background: #450a0a; }
        .status-item.warning { border-left-color: #f59e0b; background: #451a03; }
        
        /* 视频区域样式 */
        .video-banner {
            position: relative;
            width: 100%;
            aspect-ratio: 1280/672;
            background: #000;
            overflow: hidden;
            margin: 20px 0;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .video-fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('./image/banner3-fallback.webp') center/cover no-repeat, #333;
            display: none;
            align-items: center;
            justify-content: center;
            color: #DC2626;
            font-size: 24px;
            font-weight: bold;
        }
        
        .log-box {
            background: #0a0a0a;
            border: 1px solid #333;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        
        .test-btn {
            background: #DC2626;
            color: #fff;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-family: Impact, sans-serif;
            letter-spacing: 2px;
        }
        .test-btn:hover { background: #b91c1c; }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🎬 BANNER3 双模式加载测试</h1>
        
        <!-- 状态显示 -->
        <div class="status-box">
            <h3>📊 加载状态监控</h3>
            <div id="statusContainer">
                <div class="status-item" id="status-webm">⏳ WebM (GitHub): 等待中...</div>
                <div class="status-item" id="status-mp4">⏳ MP4 (Wix): 等待中...</div>
                <div class="status-item" id="status-fallback">⏳ Fallback 图片: 等待中...</div>
                <div class="status-item" id="status-playback">⏳ 播放状态: 等待中...</div>
            </div>
        </div>
        
        <!-- 视频测试区域 -->
        <div class="video-banner" id="videoContainer">
            <video id="testVideo" 
                autoplay 
                muted 
                loop 
                playsinline 
                preload="metadata"
                poster="./image/banner3-poster.jpg">
                
                <!-- 源1: GitHub WebM -->
                <source src="https://raw.githubusercontent.com/nonamepunks/bandwebsite/main/videos/banner3.webm" 
                        type="video/webm"
                        data-source="webm">
                
                <!-- 源2: Wix MP4 -->
                <source src="https://video.wixstatic.com/video/d502ca_cae18d24aaad4b468c7b2b2160253319/720p/mp4/file.mp4" 
                        type="video/mp4"
                        data-source="mp4">
            </video>
            
            <!-- 回退图片 -->
            <div class="video-fallback" id="videoFallback">
                FALLBACK IMAGE
            </div>
        </div>
        
        <!-- 控制按钮 -->
        <div style="text-align: center; margin: 20px 0;">
            <button class="test-btn" onclick="testReload()">🔄 重新加载视频</button>
            <button class="test-btn" onclick="testWebMOnly()">🔴 仅测试 WebM</button>
            <button class="test-btn" onclick="testMP4Only()">🟢 仅测试 MP4</button>
            <button class="test-btn" onclick="clearLog()">🗑️ 清除日志</button>
        </div>
        
        <!-- 日志输出 -->
        <div class="status-box">
            <h3>📝 详细日志</h3>
            <div class="log-box" id="logBox">等待开始测试...</div>
        </div>
        
        <!-- 网络信息 -->
        <div class="status-box">
            <h3>🌐 浏览器信息</h3>
            <div id="browserInfo" class="log-box"></div>
        </div>
    </div>

    <script>
        const video = document.getElementById('testVideo');
        const fallback = document.getElementById('videoFallback');
        const logBox = document.getElementById('logBox');
        let currentSource = null;
        
        // 日志函数
        function log(msg, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warning' ? '⚠️' : 'ℹ️';
            logBox.innerHTML += `[${time}] ${prefix} ${msg}\n`;
            logBox.scrollTop = logBox.scrollHeight;
            console.log(`[Banner3 Test] ${msg}`);
        }
        
        // 更新状态显示
        function updateStatus(id, status, msg) {
            const el = document.getElementById(id);
            el.className = 'status-item ' + status;
            el.innerHTML = msg;
        }
        
        // 检测实际使用的源
        function detectSource() {
            const sources = video.querySelectorAll('source');
            for (let src of sources) {
                if (!src.error && video.currentSrc.includes(src.src.split('/').pop())) {
                    return src.getAttribute('data-source');
                }
            }
            return 'unknown';
        }
        
        // 事件监听
        video.addEventListener('loadstart', () => {
            log('视频开始加载...');
            updateStatus('status-playback', 'warning', '⏳ 播放状态: 加载中...');
        });
        
        video.addEventListener('loadeddata', () => {
            const source = detectSource();
            currentSource = source;
            log(`视频数据加载完成！使用源: ${source.toUpperCase()}`, 'success');
            video.style.opacity = '1';
            
            if (source === 'webm') {
                updateStatus('status-webm', 'success', '✅ WebM (GitHub): 加载成功');
                updateStatus('status-mp4', 'success', '⏭️ MP4 (Wix): 未使用（WebM优先）');
            } else {
                updateStatus('status-webm', 'error', '❌ WebM (GitHub): 失败或不可用');
                updateStatus('status-mp4', 'success', '✅ MP4 (Wix): 加载成功（回退）');
            }
        });
        
        video.addEventListener('playing', () => {
            log('视频开始播放', 'success');
            updateStatus('status-playback', 'success', '▶️ 播放状态: 正在播放 (' + currentSource + ')');
        });
        
        video.addEventListener('error', (e) => {
            const error = video.error;
            let errorMsg = '未知错误';
            if (error) {
                switch(error.code) {
                    case 1: errorMsg = '下载中断'; break;
                    case 2: errorMsg = '网络错误'; break;
                    case 3: errorMsg = '解码错误'; break;
                    case 4: errorMsg = '格式不支持'; break;
                }
            }
            log(`视频错误: ${errorMsg} (code: ${error?.code})`, 'error');
            updateStatus('status-playback', 'error', `❌ 播放状态: 错误 - ${errorMsg}`);
            showFallback();
        });
        
        video.addEventListener('stalled', () => {
            log('视频加载停滞', 'warning');
        });
        
        // 源错误监听
        video.querySelectorAll('source').forEach(src => {
            src.addEventListener('error', () => {
                const type = src.getAttribute('data-source');
                log(`${type.toUpperCase()} 源加载失败: ${src.src.substring(0, 50)}...`, 'error');
                if (type === 'webm') {
                    updateStatus('status-webm', 'error', '❌ WebM (GitHub): 加载失败');
                } else {
                    updateStatus('status-mp4', 'error', '❌ MP4 (Wix): 加载失败');
                    showFallback();
                }
            });
        });
        
        // 显示回退
        function showFallback() {
            video.style.display = 'none';
            fallback.style.display = 'flex';
            updateStatus('status-fallback', 'success', '✅ Fallback 图片: 已显示');
            log('已切换到 fallback 图片', 'warning');
        }
        
        // 测试功能
        function testReload() {
            log('重新加载视频...');
            video.style.opacity = '0';
            video.style.display = 'block';
            fallback.style.display = 'none';
            video.load();
        }
        
        function testWebMOnly() {
            log('测试仅 WebM 模式...');
            video.innerHTML = `
                <source src="https://raw.githubusercontent.com/nonamepunks/bandwebsite/main/videos/banner3.webm" 
                        type="video/webm" data-source="webm">
            `;
            video.load();
        }
        
        function testMP4Only() {
            log('测试仅 MP4 模式...');
            video.innerHTML = `
                <source src="https://video.wixstatic.com/video/d502ca_cae18d24aaad4b468c7b2b2160253319/720p/mp4/file.mp4" 
                        type="video/mp4" data-source="mp4">
            `;
            video.load();
        }
        
        function clearLog() {
            logBox.innerHTML = '日志已清除...\n';
        }
        
        // 浏览器信息
        function showBrowserInfo() {
            const info = {
                'User Agent': navigator.userAgent,
                '支持 WebM': MediaSource.isTypeSupported('video/webm; codecs="vp9"') ? '是' : '否',
                '支持 MP4': MediaSource.isTypeSupported('video/mp4; codecs="avc1.42E01E"') ? '是' : '否',
                '网络状态': navigator.onLine ? '在线' : '离线',
                '连接类型': navigator.connection?.effectiveType || '未知',
                '屏幕尺寸': `${window.innerWidth}x${window.innerHeight}`,
                '设备像素比': window.devicePixelRatio
            };
            
            document.getElementById('browserInfo').innerHTML = 
                Object.entries(info).map(([k, v]) => `${k}: ${v}`).join('\n');
        }
        
        // 初始化
        showBrowserInfo();
        log('测试页面已加载，开始检测视频...');
        
        // 3秒后备检查
        setTimeout(() => {
            if (video.readyState < 2) {
                log('警告：视频 3 秒后仍未就绪', 'warning');
            }
        }, 3000);
    </script>
</body>
</html>
